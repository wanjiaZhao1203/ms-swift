# Variant V5 — DPO on top of V1's final checkpoint.
#
# Preference pairs come from V1 generations ranked by ttcc-eval IBS against
# ground truth. Same language-emission interface as V1 (the model writes
# the curve as a token sequence). DPO sharpens the SFT model toward
# better-IBS outputs without changing the architecture.

model: /opt/dlami/nvme/ssm-out/sft_lm_full_no_cot/checkpoint-final  # V1 final
torch_dtype: bfloat16
attn_impl: flash_attn

rlhf_type: dpo

# DPO preference dataset: each row has {prompt, chosen, rejected}.
# Build with scripts/data/build_dpo_pairs_from_sft.py once V1 is done.
dataset: /home/ssm-user/work/data/ttcc_dpo_pairs/train.jsonl
max_length: 24576
truncation_strategy: delete
lazy_tokenize: true
strict: false
dataset_num_proc: 1
group_by_length: false

tuner_type: full
freeze_vit: true
freeze_aligner: true

gradient_checkpointing: true
vit_gradient_checkpointing: true
torch_compile: true
deepspeed: zero3

beta: 0.1                                       # DPO temperature
num_train_epochs: 3                             # DPO converges quickly
learning_rate: 5.0e-7                           # DPO LR is much lower than SFT
warmup_ratio: 0.1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8

logging_steps: 5
eval_steps: 50
save_steps: 50
save_total_limit: 3
report_to: [tensorboard, wandb]

output_dir: /opt/dlami/nvme/ssm-out/dpo_lm_full_no_cot

dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 4
