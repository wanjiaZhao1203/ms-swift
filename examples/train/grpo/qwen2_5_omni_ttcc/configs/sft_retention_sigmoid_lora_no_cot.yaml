# Variant V4 — SFT, retention head (sigmoid), LoRA, no CoT.
#
# Custom model_type qwen2_5_omni_retention with a per-second sigmoid head
# reading the hidden state at the last input token (no </cot> anchor since
# no CoT). MSE loss; no monotone prior.
#
# Matches wanjia milestone §5 (SFT-MSE / per-second sigmoid). LoRA tuning,
# loss = masked MSE on R(t).

model: /home/ssm-user/work/hf-cache/Qwen2.5-Omni-3B
torch_dtype: bfloat16
attn_impl: flash_attn

external_plugins:
  - examples/custom/qwen2_5_omni_retention/register.py
model_type: qwen2_5_omni_retention
loss_type: retention_loss

# Key name "ENV" is mandatory: ms-swift's parse_yaml_args pops it from the
# YAML and writes os.environ before SwiftSft initializes. Any other key
# name (e.g. extra_env) becomes a remaining_argv error.
ENV:
  RETENTION_HEAD_TYPE: sigmoid
  RETENTION_COT_ALPHA: '0.0'                  # no CoT → no auxiliary LM loss

# No-CoT dataset (curve numbers only in assistant turn, no <cot> reasoning).
dataset: /home/ssm-user/work/data/ttcc_swift_v2cot_nocot/ttcc_train_sft.jsonl
# Required: the retention plugin reads R via _extra_kwargs; removing
# unused columns strips it before collation.
remove_unused_columns: false
val_dataset: /home/ssm-user/work/data/ttcc_holdout/val_200_no_cot.jsonl
eval_strategy: steps
max_length: 32768
truncation_strategy: delete
lazy_tokenize: true
strict: false
dataset_num_proc: 1
group_by_length: false

tuner_type: lora
lora_rank: 16
lora_alpha: 32
target_modules: all-linear
# Persist the retention_head in adapter_model.safetensors. Without this,
# peft freezes non-LoRA params and the head's random-init weights are lost.
modules_to_save:
  - retention_head
freeze_vit: true
freeze_aligner: true

gradient_checkpointing: true
vit_gradient_checkpointing: true
torch_compile: false
deepspeed: zero2

num_train_epochs: 10
learning_rate: 1.0e-4
warmup_ratio: 0.05
max_grad_norm: 1.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 8

logging_steps: 5
eval_steps: 50
save_steps: 50
save_total_limit: 10
report_to: [tensorboard, wandb]

output_dir: /opt/dlami/nvme/ssm-out/sft_retention_sigmoid_lora_no_cot

dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 4
