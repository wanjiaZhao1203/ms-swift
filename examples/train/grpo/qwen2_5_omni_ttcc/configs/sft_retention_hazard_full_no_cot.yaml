# Variant V5 — SFT, retention head (hazard), FULL fine-tune, NO CoT.
#
# Tests whether the hazard structure (softplus → cumsum → exp) carries the
# load on its own without a distilled-CoT span feeding the anchor position.
# The plugin's anchor falls back to the last input token when no </cot>
# tokens are present.
#
# Same recipe as sft_retention_hazard_full_with_cot.yaml except:
#   - dataset = no-CoT 717-row train (assistant span = "Curve: {...}" only)
#   - RETENTION_COT_ALPHA = 0.0 (no auxiliary LM-CE on assistant span)

model: /home/ssm-user/work/hf-cache/Qwen2.5-Omni-3B
torch_dtype: bfloat16
attn_impl: flash_attn

external_plugins:
  - examples/custom/qwen2_5_omni_retention/register.py
model_type: qwen2_5_omni_retention
loss_type: retention_loss

ENV:
  RETENTION_HEAD_TYPE: hazard
  RETENTION_COT_ALPHA: '0.0'                # no CoT body → no auxiliary loss

dataset: /home/ssm-user/work/data/ttcc_swift_v2cot_nocot/ttcc_train_sft.jsonl
val_dataset: /home/ssm-user/work/data/ttcc_holdout/val_200_no_cot.jsonl
eval_strategy: steps
max_length: 32768
truncation_strategy: delete
lazy_tokenize: true
strict: false
dataset_num_proc: 1
group_by_length: false
remove_unused_columns: false

tuner_type: full
freeze_vit: true
freeze_aligner: true

gradient_checkpointing: true
vit_gradient_checkpointing: true
torch_compile: false
deepspeed: zero3

num_train_epochs: 10
learning_rate: 5.0e-6
warmup_ratio: 0.05
max_grad_norm: 1.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 8

logging_steps: 1
eval_steps: 50
save_steps: 50
save_total_limit: 10
report_to: [tensorboard, wandb]
output_dir: /opt/dlami/nvme/ssm-out/sft_retention_hazard_full_no_cot

dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 4
