# RL PRODUCTION run-4 — full-FT RL to RESHAPE the video features (Leon: RL backprops into the whole
# backbone, so it CAN improve the representation). Fixes the run-2/3 over-opt: MARGIN reward (drop
# noisy near-tie pairs -> large-margin LtR generalizes), LOWER KL (let the backbone actually move),
# held-out early-stop. Tests whether full-FT RL can push val SRCC past 0.514 by reshaping features.
# vs run-2: beta 10->50 (sharper concordance: gate sweep cosine +0.59->+0.64 AND ~3x within-group
# spread), sigma 0.2->0.3 (more rollout spread), + warmup-skip (HPG_BUF_MIN: zero advantage until the
# buffer is warm, to kill the run-2 ckpt-25 drift). Gate sweep: verification/gate_sweep.py.
#
# CHANGE vs run-1 (rl_head_pg.yaml): the REWARD only. run-1 used per-ad percentile-MATCH vs a
# fixed CDF (a CALIBRATION reward) -> empirically a no-op for cross-ad ranking (ckpt-25/50/75 all
# <= baseline 0.514; cosine vs the SRCC direction = 0.0). run-2 uses a CROSS-AD pairwise CONCORDANCE
# reward (HPG_REWARD=crossad): each rollout is scored by how correctly it orders THIS ad against a
# detached running buffer of recent ads -> the within-ad advantage now carries cross-ad order.
# Cosine gate vs the SRCC-improving direction = +0.59 (run-1 = 0.0). See verification/gate_cosine_crossad.py
# + RUN2_DESIGN.md. Everything else (ckpt-225 init, ZeRO-3 full-FT, KL anchor, sigma/G/lr) is
# IDENTICAL to run-1 — minimal delta; KL is the sole calibration anchor.
#
# Policy = diagonal Gaussian on the head's hazard logits z; action z'=z+sigma*eps;
# curve=exp(-cumsum(softplus(z'))); reward = cross-ad concordance vs a running buffer (run-2);
# advantage = within-ad group-relative; loss = -(logpi*A) + KL to the frozen SFT head.
# mu_z is DERIVED from the model OUTPUT r_pred (softplus^-1(-Δlog R)) so the backward flows the
# standard path ZeRO-3/DDP instrument — exactly like GRPO from logits (rl/head_pg_trainer.py).
#
# ** LAUNCH WITH rl.sh -> rl/train_head_pg.py — NOT `swift sft`. ** Multi-node: use the EFA
# launcher (launch_rl_2node.sh) with MASTER_PORT!=29500 (SFT holds 29500). See RL_LAUNCH_BLOCKERS.md.
#
# Option B = full fine-tune (train LLM+head; freeze vit/aligner, like the SFT) + deepspeed zero3
# (the PROVEN SFT backend). Verified on 2 cards: self-check Δ=0, clean run, eval-loadable ckpt.
#
# ** per_device_train_batch_size MUST be 1 ** (head reads the LITERAL last token; bs>1 right-pads
# -> L-1 becomes a PAD hidden -> mismatches eval). Scale via grad-accum + more GPUs, not bs.
# attn_impl pinned to flash_attn; eval must use the SAME kernel (re-baseline ckpt-150 SRCC under it).

model: /opt/dlami/nvme/ssm-out/sft_retention_hazard_full_with_cot/v19-20260528-180726/checkpoint-225  # SFT ckpt-225 = latest/best (us-east-2); init RL from here
torch_dtype: bfloat16
attn_impl: flash_attn               # PINNED; eval baseline must match this kernel

external_plugins:
  - examples/custom/qwen2_5_omni_retention/register.py
model_type: qwen2_5_omni_retention

ENV:
  RETENTION_HEAD_TYPE: hazard
  HPG_CDF: /opt/dlami/nvme/home/ssm-user/work/data/ttcc_v8/train_cdf.npz   # train-only, val-disjoint
  HPG_G: '16'
  HPG_SIGMA: '0.3'
  HPG_KL: '0.03'                     # stronger (full-FT can drift); verified KL~0.07 at this setting
  HPG_CLIP: '1.0'
  HPG_TLO: '1'
  HPG_THI: '30'
  HPG_FREEZE_BACKBONE: '0'          # B: train LLM+head (vit/aligner frozen below) -> zero3 partitions cleanly
  HPG_REWARD: 'crossad'             # cross-ad pairwise concordance vs buffer (run-1='rrank', dead)
  HPG_BETA: '50.0'
  HPG_MARGIN: '0.05'                # run-4: only score ad-pairs with |true gap|>=0.05 (drop noisy near-ties)                  # run-3: sharper concordance (sweep: +0.64 cosine, ~3x spread vs beta=10)
  HPG_BUF: '256'                    # per-GPU FIFO of recent ads' (pred-mean curve, true curve)
  HPG_BUF_MIN: '64'                 # run-3: zero advantage until buffer >= this (warmup-skip; kills ckpt-25 drift)

dataset: /opt/dlami/nvme/home/ssm-user/work/data/ttcc_v8/ttcc_train_bypass.jsonl   # assistant=<cot></cot>, video+R
max_length: 32768
truncation_strategy: delete
lazy_tokenize: true
strict: false
dataset_num_proc: 1
group_by_length: false
remove_unused_columns: false

tuner_type: full
freeze_vit: true                    # mirror SFT
freeze_aligner: true

gradient_checkpointing: true        # full-FT 3B+Adam needs it for activations (SFT uses it too)
vit_gradient_checkpointing: true
torch_compile: false
deepspeed: zero3                    # PROVEN SFT backend; works via mu_z-from-output derivation

num_train_epochs: 1                 # ~280 steps at effective batch 128 (low end of SRCC-movement window)
learning_rate: 1.0e-6               # decision-A: every full-FT GRPO (DeepSeekMath/DAPO/TRL/verl/ms-swift) uses 1e-6; protects baseline
warmup_ratio: 0.03
max_grad_norm: 1.0                  # == HPG_CLIP
per_device_train_batch_size: 1      # REQUIRED (see header)
gradient_accumulation_steps: 8      # effective ads/step = 1 * 8 * world_size (=128 on 2x8)

logging_steps: 1
eval_strategy: 'no'                 # held-out cross-ad SRCC tracked separately per-checkpoint (eval box)
save_steps: 25
save_total_limit: 20
report_to: [tensorboard, wandb]
output_dir: /opt/dlami/nvme/ssm-out/rl_head_pg_v4     # run-3 (separate output)

dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 4
