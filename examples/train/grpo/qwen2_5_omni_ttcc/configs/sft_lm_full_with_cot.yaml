# Variant V2 — SFT, language emission, full fine-tune, WITH CoT.
#
# Identical to V1 except the dataset path: uses the CoT-distilled JSONL
# where the assistant turn contains <cot>...</cot> reasoning before the
# curve numbers.
#
# Q this variant answers: does chain-of-thought reasoning before the
# numeric answer improve the language-emission curve? Compare against V1.

model: /home/ssm-user/work/hf-cache/Qwen2.5-Omni-3B
torch_dtype: bfloat16
attn_impl: flash_attn

# CoT-distilled dataset (R prefixed by <cot>...</cot> reasoning in the
# assistant turn). Build with scripts/data/build_ttcc_jsonl.py --with-cot.
dataset: /home/ssm-user/work/data/ttcc_swift_v2cot/ttcc_train_sft.jsonl
max_length: 24576
truncation_strategy: delete
lazy_tokenize: true
strict: false
dataset_num_proc: 1
group_by_length: false

tuner_type: full
freeze_vit: true
freeze_aligner: true

gradient_checkpointing: true
vit_gradient_checkpointing: true
torch_compile: true
deepspeed: zero3

num_train_epochs: 10
learning_rate: 1.0e-5
warmup_ratio: 0.05
per_device_train_batch_size: 1
gradient_accumulation_steps: 8

logging_steps: 5
eval_steps: 50
save_steps: 50
save_total_limit: 3
report_to: [tensorboard, wandb]

output_dir: /opt/dlami/nvme/ssm-out/sft_lm_full_with_cot

dataloader_num_workers: 4
dataloader_persistent_workers: true
dataloader_prefetch_factor: 4
